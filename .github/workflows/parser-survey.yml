---
name: Parser Survey

on:
  workflow_call:
    inputs:
      zsh-lint-ref:
        description: zsh-lint ref to build the survey binary from
        type: string
        required: false
        default: main
      fail-on-parse-error:
        description: Fail the job when any file fails to parse
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  survey:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out the calling repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: target
          # The calling repo's contents are treated as untrusted data (only
          # parsed, never executed). Don't persist the token into its git
          # config — CodeQL "checkout of untrusted code in trusted context".
          persist-credentials: false

      - name: ⤵️ Check out zsh-lint
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: z-shell/zsh-lint
          ref: ${{ inputs['zsh-lint-ref'] }}
          path: zsh-lint

      - name: ⎔ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: 🏗 Build the survey binary
        working-directory: zsh-lint
        run: go build -o "$RUNNER_TEMP/zsh-lint" ./cmd/zsh-lint

      - name: 🔎 Survey Zsh files
        working-directory: target
        shell: bash
        env:
          # Bound via env (not inlined in the script) to avoid shell
          # expression-injection and keep the run block static.
          FAIL_ON_PARSE_ERROR: ${{ inputs['fail-on-parse-error'] }}
        run: |
          set -o pipefail
          mapfile -t files < <(find . -type f \( -name '*.zsh' -o -name '*.zshrc' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Zsh files found to survey."
            exit 0
          fi
          echo "Surveying ${#files[@]} file(s)..."
          set +e
          "$RUNNER_TEMP/zsh-lint" "${files[@]}"
          status=$?
          set -e
          if [ "$FAIL_ON_PARSE_ERROR" = "true" ]; then
            exit "$status"
          fi
          echo "fail-on-parse-error is false; reporting only (survey exit status was $status)."
