---
name: Docs Generate Check

on:
  push:
    branches: [main]
    paths: ["**/*.go", ".gomarkdoc.yml", ".github/workflows/docs-generate.yml"]
  pull_request:
    paths: ["**/*.go", ".gomarkdoc.yml", ".github/workflows/docs-generate.yml"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ⎔ Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - name: 📝 Generate reference Markdown
        run: go tool gomarkdoc --output "$RUNNER_TEMP/ref.md" ./cmd/zsh-lint ./cmd/zsh-lint-survey ./internal/survey
      - name: ✅ Verify generation is non-empty
        run: test -s "$RUNNER_TEMP/ref.md"
