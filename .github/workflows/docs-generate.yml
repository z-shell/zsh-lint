---
name: Docs Generate Check

on:
  push:
    branches: [main]
    paths: ["**/*.go", ".gomarkdoc.yml", ".github/workflows/docs-generate.yml"]
  pull_request:
    paths: ["**/*.go", ".gomarkdoc.yml", ".github/workflows/docs-generate.yml"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: ⎔ Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
      - name: 📝 Generate reference Markdown
        run: go tool gomarkdoc --output "$RUNNER_TEMP/ref.md" ./cmd/zsh-lint ./internal/survey
      - name: ✅ Verify generation is non-empty
        run: test -s "$RUNNER_TEMP/ref.md"
